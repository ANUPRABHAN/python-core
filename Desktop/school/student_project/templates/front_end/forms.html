<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form page</title>
        <style>
            body { font-family: Arial, sans-serif; margin:0; padding:0; }
            header { background:#4CAF50; color:white; padding:1rem 2rem; }
            nav a { color:white; margin-right:1rem; text-decoration:none; }
            .form { padding:2rem; }
            fieldset { max-width:400px; margin:auto; }
        </style>
    </head>
    <body>
        <header>
            <h1>Add New Student</h1>
            <nav>
                <a href="{% url 'home' %}">Home</a>
                <a href="/list/">View Students</a>
            </nav>
        </header>
        <div class = "form">
            <form method="post">
            {% csrf_token %}
            <fieldset>
                <legend align = "center"><h2><b>REGISTER</b></h2></legend>

            <label for ="stu_id">STU_ID :</label>
            <input type= "text" id = "stu_id" name= "stu_id" value=""><br>

            <label for ="name">Name : </label>
            <input type= "text" id = "name" name= "name" value=""><br>

            <label for ="age">Age : </label>
            <input type= "number" id = "age" name= "age" value=""><br>

            <input type = "submit" class = "sub" value="SUBMIT">

            </fieldset>
            </form>
        </div>
    </body>
</html>
